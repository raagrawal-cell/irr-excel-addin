<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVP IRR Analytics Engine</title>

<!-- Office.js SDK — must load before any Office API calls -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   Dark finance terminal aesthetic — matches all HTML modules
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg:       #0a0e1a;
  --surface:  #111827;
  --surface2: #1a2235;
  --border:   #1e2d45;
  --teal:     #0fd4b4;
  --teal-dim: #0a8a75;
  --navy:     #1a3a5c;
  --gold:     #f0b429;
  --red:      #ef4444;
  --green:    #22c55e;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --dim:      #334155;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Google Sans", Arial, sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0a1520 0%, #0d1f38 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--teal);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--teal);
  flex-shrink: 0;
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.3px;
}
.header-subtitle {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ── Status bar ── */
.status-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.ready  { background: var(--green); box-shadow: 0 0 4px var(--green); }
.status-dot.loading { background: var(--gold); box-shadow: 0 0 4px var(--gold); animation: pulse 1s infinite; }
.status-dot.error  { background: var(--red);  box-shadow: 0 0 4px var(--red); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.status-text { flex: 1; color: var(--muted); font-size: 11px; }

/* ── Config selector ── */
.config-row {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.config-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  white-space: nowrap;
}
.config-select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  padding: 4px 8px;
  outline: none;
  cursor: pointer;
}
.config-select:focus { border-color: var(--teal-dim); }
.btn-reload {
  background: var(--teal-dim);
  border: none;
  border-radius: 4px;
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-reload:hover { background: var(--teal); }
.btn-reload:disabled { opacity: 0.4; cursor: default; }

/* ── KPI strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.kpi {
  background: var(--surface);
  padding: 8px 10px;
  text-align: center;
}
.kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.kpi-value { font-size: 14px; font-weight: 700; color: var(--teal); margin-top: 2px; }
.kpi-value.warn { color: var(--gold); }
.kpi-value.neg  { color: var(--red);  }

/* ── Module grid ── */
.modules-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.section-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 6px 4px 4px;
  margin-bottom: 2px;
}
.module-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  margin-bottom: 6px;
  text-align: left;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.module-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--teal);
  opacity: 0;
  transition: opacity 0.15s;
}
.module-btn:hover {
  background: var(--surface2);
  border-color: var(--teal-dim);
}
.module-btn:hover::before { opacity: 1; }
.module-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.module-btn:disabled:hover { background: var(--surface); border-color: var(--border); }
.module-btn:disabled:hover::before { opacity: 0; }

.module-icon { font-size: 16px; flex-shrink: 0; }
.module-info { flex: 1; min-width: 0; }
.module-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
.module-desc { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.module-arrow { color: var(--teal); font-size: 10px; opacity: 0; transition: opacity 0.15s; }
.module-btn:hover .module-arrow { opacity: 1; }

/* ── Footer ── */
.footer {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  font-size: 9px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.footer-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--muted);
  font-size: 9px;
  padding: 2px 7px;
  cursor: pointer;
  transition: all 0.1s;
}
.footer-btn:hover { border-color: var(--teal-dim); color: var(--teal); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  padding: 8px 16px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  color: #fff;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { background: #1a5c3a; border: 1px solid var(--green); }
.toast.err  { background: #5c1a1a; border: 1px solid var(--red); }
.toast.info { background: var(--navy); border: 1px solid var(--teal-dim); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-dot"></div>
    <div>
      <div class="header-title">IVP IRR Analytics Engine</div>
      <div class="header-subtitle">PE · VC · PRIVATE ASSETS</div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Initialising Office.js…</span>
</div>

<!-- CONFIG SELECTOR -->
<div class="config-row">
  <span class="config-label">Config</span>
  <select class="config-select" id="configSelect" onchange="onConfigChange(this.value)">
    <option value="">— loading —</option>
  </select>
  <button class="btn-reload" id="btnReload" onclick="reloadBundle()" disabled>↺ Load</button>
</div>

<!-- KPI STRIP -->
<div class="kpi-strip" id="kpiStrip">
  <div class="kpi">
    <div class="kpi-label">Fund IRR</div>
    <div class="kpi-value" id="kpiIRR">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">MOIC</div>
    <div class="kpi-value" id="kpiMOIC">—</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">As Of</div>
    <div class="kpi-value" id="kpiQtr" style="font-size:11px">—</div>
  </div>
</div>

<!-- MODULE LAUNCHER -->
<div class="modules-scroll">

  <div class="section-label">Analytics</div>

  <button class="module-btn" id="btnDashboard" onclick="openModule('analyticsDashboard')" disabled>
    <span class="module-icon">📊</span>
    <div class="module-info">
      <div class="module-name">Analytics Dashboard</div>
      <div class="module-desc">Cashflow details · Sub-period IRR trending</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

  <button class="module-btn" id="btnAttribution" onclick="openModule('attribution')" disabled>
    <span class="module-icon">🗂️</span>
    <div class="module-info">
      <div class="module-name">Performance Attribution</div>
      <div class="module-desc">7-bucket IRR attribution · Fund vs deal</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

  <div class="section-label" style="margin-top:6px">Computation</div>

  <button class="module-btn" id="btnBacksolve" onclick="openModule('reverseIRR')" disabled>
    <span class="module-icon">🎯</span>
    <div class="module-info">
      <div class="module-name">Reverse IRR / Backsolve</div>
      <div class="module-desc">Exit NAV · MOIC · Hold period · Add-on cashflow</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

  <button class="module-btn" id="btnSimEngine" onclick="openModule('irrSimulator')" disabled>
    <span class="module-icon">⚡</span>
    <div class="module-info">
      <div class="module-name">SimEngine — Scenario Analysis</div>
      <div class="module-desc">20 stress scenarios · NLP-powered · AI narration</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

  <div class="section-label" style="margin-top:6px">Reporting</div>

  <button class="module-btn" id="btnCommentary" onclick="openModule('managementCommentary')" disabled>
    <span class="module-icon">📝</span>
    <div class="module-info">
      <div class="module-name">Management Commentary</div>
      <div class="module-desc">IC narrative · Fund summary · Deal highlights</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

  <div class="section-label" style="margin-top:6px">Settings</div>

  <button class="module-btn" id="btnConfig" onclick="openModule('configLibrary')">
    <span class="module-icon">⚙️</span>
    <div class="module-info">
      <div class="module-name">Config Library</div>
      <div class="module-desc">Column mapping · Hierarchy · Named configs</div>
    </div>
    <span class="module-arrow">▶</span>
  </button>

</div>

<!-- FOOTER -->
<div class="footer">
  <span>IRR Engine v2.0 · Excel Add-in</span>
  <div style="display:flex;gap:6px">
    <button class="footer-btn" onclick="openModule('configLibrary')">Config</button>
    <button class="footer-btn" onclick="showAbout()">About</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN SCRIPT
     All google.script.run calls are replaced by imports from
     engine/dataReader.js. Office.js is the new runtime bridge.
═══════════════════════════════════════════════════════════ -->
<script type="module">
import {
  getActiveConfig,
  getConfigs,
  buildBundle,
  getSheetNames
} from './engine/dataReader.js';

import { formatIRR, formatMOIC } from './engine/xirr.js';

// ── Module state ────────────────────────────────────────────────────────
let IVP_BUNDLE  = null;   // Active BUNDLE — shared via window for dialogs
let IVP_CONFIGS = [];     // All saved configs
let IVP_CFG     = null;   // Active config {name, config}

// Make bundle globally accessible so dialogs can import it
window.IVP_BUNDLE  = null;
window.IVP_CFG     = null;
window.IVP_CONFIGS = [];

// ── Initialise ───────────────────────────────────────────────────────────
Office.onReady(async (info) => {
  if (info.host !== Office.HostType.Excel) {
    setStatus('error', 'This add-in requires Microsoft Excel.');
    return;
  }

  setStatus('loading', 'Loading configurations…');

  try {
    // Load all saved configs
    IVP_CONFIGS         = await getConfigs();
    window.IVP_CONFIGS  = IVP_CONFIGS;
    populateConfigDropdown(IVP_CONFIGS);

    if (IVP_CONFIGS.length === 0) {
      setStatus('error', 'No configs found. Open Config Library to set up.');
      enableButton('btnConfig', true);
      return;
    }

    // Load the active config
    IVP_CFG = await getActiveConfig();
    if (IVP_CFG && IVP_CFG.config) {
      document.getElementById('configSelect').value = IVP_CFG.name;
      window.IVP_CFG = IVP_CFG;
      await loadBundle(IVP_CFG.config);
    } else {
      setStatus('error', 'No default config found. Select one and click Load.');
      document.getElementById('btnReload').disabled = false;
    }

  } catch (e) {
    setStatus('error', 'Init error: ' + e.message);
    console.error('[taskpane] Init error:', e);
  }
});

// ── Load bundle from config ──────────────────────────────────────────────
async function loadBundle(cfg) {
  setStatus('loading', 'Reading workbook data…');
  document.getElementById('btnReload').disabled = true;
  disableAllModules();

  try {
    IVP_BUNDLE        = await buildBundle(cfg);
    window.IVP_BUNDLE = IVP_BUNDLE;

    if (IVP_BUNDLE.error) {
      setStatus('error', IVP_BUNDLE.error);
      enableButton('btnConfig', true);
      document.getElementById('btnReload').disabled = false;
      return;
    }

    updateKPIs(IVP_BUNDLE);
    setStatus('ready',
      `${IVP_BUNDLE.txnCount} records · ${IVP_BUNDLE.deals.length} deals · ${IVP_BUNDLE.quarters.length} quarters`
    );
    enableAllModules();
    document.getElementById('btnReload').disabled = false;
    toast(`✓ Data loaded — ${IVP_BUNDLE.lastQuarter || 'no quarters'}`, 'ok');

  } catch (e) {
    setStatus('error', 'Build failed: ' + e.message);
    enableButton('btnConfig', true);
    document.getElementById('btnReload').disabled = false;
    console.error('[taskpane] buildBundle error:', e);
  }
}

// ── Config selector ──────────────────────────────────────────────────────
function populateConfigDropdown(configs) {
  const sel = document.getElementById('configSelect');
  sel.innerHTML = configs.length === 0
    ? '<option value="">— no configs saved —</option>'
    : configs.map(c =>
        `<option value="${esc(c.name)}">${esc(c.name)}${c.isDefault ? ' ★' : ''}</option>`
      ).join('');
}

window.onConfigChange = function(name) {
  const match = IVP_CONFIGS.find(c => c.name === name);
  if (match) {
    IVP_CFG        = match;
    window.IVP_CFG = match;
  }
  document.getElementById('btnReload').disabled = false;
};

window.reloadBundle = async function() {
  const name  = document.getElementById('configSelect').value;
  const match = IVP_CONFIGS.find(c => c.name === name);
  if (!match || !match.config) {
    toast('Select a valid config first.', 'err');
    return;
  }
  IVP_CFG        = match;
  window.IVP_CFG = match;
  await loadBundle(match.config);
};

// ── Open module dialogs ──────────────────────────────────────────────────
// Modules open as full-screen Office dialogs (not the narrow task pane).
// This preserves the full 800–1200px layout the modules were designed for.
window.openModule = function(moduleName) {
  if (!IVP_BUNDLE && moduleName !== 'configLibrary') {
    toast('Data not loaded yet. Wait for the bundle to build.', 'err');
    return;
  }

  const baseUrl = getBaseUrl();
  const moduleUrl = `${baseUrl}/modules/${moduleName}.html`;

  // Pass bundle via sessionStorage (same origin = shared access)
  // This avoids the 2KB message-passing limit of Office.context.ui
  try {
    sessionStorage.setItem('IVP_BUNDLE',  JSON.stringify(IVP_BUNDLE));
    sessionStorage.setItem('IVP_CFG',     JSON.stringify(IVP_CFG));
    sessionStorage.setItem('IVP_CONFIGS', JSON.stringify(IVP_CONFIGS));
  } catch (e) {
    console.warn('[taskpane] sessionStorage write failed:', e.message);
    // Bundle will be re-built by the dialog from the workbook directly
  }

  Office.context.ui.displayDialogAsync(
    moduleUrl,
    { width: 92, height: 88, displayInIframe: false },
    (result) => {
      if (result.status === Office.AsyncResultStatus.Failed) {
        toast('Could not open module: ' + result.error.message, 'err');
        return;
      }

      const dialog = result.value;

      // Listen for messages from the dialog (e.g. "config saved, reload")
      dialog.addEventHandler(Office.EventType.DialogMessageReceived, (msg) => {
        try {
          const data = JSON.parse(msg.message);
          if (data.type === 'config_saved' || data.type === 'compute_complete') {
            // Config Library saved a new config or ran compute — refresh bundle
            dialog.close();
            refreshAfterConfigSave();
          }
          if (data.type === 'close') {
            dialog.close();
          }
        } catch (e) {
          console.warn('[taskpane] Dialog message parse error:', e.message);
        }
      });

      dialog.addEventHandler(Office.EventType.DialogEventReceived, (evt) => {
        if (evt.error === 12006) {
          // Dialog was closed by user — no action needed
        }
      });
    }
  );
};

async function refreshAfterConfigSave() {
  IVP_CONFIGS         = await getConfigs();
  window.IVP_CONFIGS  = IVP_CONFIGS;
  populateConfigDropdown(IVP_CONFIGS);
  const active = await getActiveConfig();
  if (active && active.config) {
    document.getElementById('configSelect').value = active.name;
    IVP_CFG        = active;
    window.IVP_CFG = active;
    await loadBundle(active.config);
  }
}

// ── KPI update ───────────────────────────────────────────────────────────
function updateKPIs(bundle) {
  const fund = bundle.fund || {};
  const irrEl  = document.getElementById('kpiIRR');
  const moicEl = document.getElementById('kpiMOIC');
  const qtrEl  = document.getElementById('kpiQtr');

  if (fund.irr !== null && fund.irr !== undefined) {
    const irrPct = (fund.irr * 100);
    irrEl.textContent  = irrPct.toFixed(1) + '%';
    irrEl.className    = 'kpi-value' + (irrPct >= 15 ? '' : irrPct >= 8 ? ' warn' : ' neg');
  } else {
    irrEl.textContent = 'N/A';
  }

  moicEl.textContent  = fund.moic ? fund.moic.toFixed(2) + 'x' : 'N/A';
  qtrEl.textContent   = bundle.lastQuarter || 'N/A';
}

// ── Status helpers ────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const span = document.getElementById('statusText');
  dot.className   = 'status-dot ' + state;
  span.textContent = text;
}

function enableAllModules() {
  ['btnDashboard','btnAttribution','btnBacksolve','btnSimEngine','btnCommentary','btnConfig']
    .forEach(id => enableButton(id, true));
}

function disableAllModules() {
  ['btnDashboard','btnAttribution','btnBacksolve','btnSimEngine','btnCommentary']
    .forEach(id => enableButton(id, false));
}

function enableButton(id, enabled) {
  const el = document.getElementById(id);
  if (el) el.disabled = !enabled;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Utilities ─────────────────────────────────────────────────────────────
function getBaseUrl() {
  // Derives the base URL of the add-in from the current page URL
  const url = window.location.href;
  return url.substring(0, url.lastIndexOf('/'));
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

window.showAbout = function() {
  alert(
    'IVP IRR Analytics Engine\n' +
    'Excel Web Add-in v1.0\n\n' +
    'Modules: Analytics Dashboard · Attribution · Reverse IRR\n' +
    'SimEngine · Management Commentary · Config Library\n\n' +
    'XIRR: Newton-Raphson + Brent bisection (ACT/365)\n' +
    '© Indus Valley Partners · www.ivp.in'
  );
};
</script>

</body>
</html>
