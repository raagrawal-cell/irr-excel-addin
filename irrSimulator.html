<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<base target="_top">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════
   SIMENGINE — PORTFOLIO SIMULATION PLATFORM
   Replaces old chat-based IRR Simulator
   Google Sheets integrated via BUNDLE + google.script.run
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  --bg:#060A13;--surface:#0D1320;--card:#131B2E;--elevated:#1A2540;
  --border:#1E2D4A;--borderLight:#2A3D60;
  --text:#E2E8F0;--textMuted:#94A3B8;--textDim:#64748B;
  --accent:#3B82F6;--accentSoft:#2563EB;
  --teal:#14B8A6;--tealSoft:#0F766E;
  --orange:#F59E0B;--red:#EF4444;--green:#22C55E;
  --purple:#A78BFA;--purpleSoft:#7C3AED;
  --white:#FFFFFF;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
button{font-family:var(--font);cursor:pointer;}input,textarea{font-family:var(--font);}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:100vh;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.sidebar-logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--white);font-weight:700;}
.nav-section{padding:12px 10px 6px;flex:1;overflow-y:auto;}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;border:none;background:transparent;text-align:left;margin-bottom:2px;transition:background .15s;}
.nav-btn:hover{background:rgba(59,130,246,.06);}
.nav-btn.active{background:rgba(59,130,246,.08);}
.nav-btn-icon{font-size:15px;color:var(--textDim);}
.nav-btn.active .nav-btn-icon{color:var(--accent);}
.nav-btn-label{font-size:12px;font-weight:500;color:var(--textMuted);}
.nav-btn.active .nav-btn-label{color:var(--white);}
.nav-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--accent);font-weight:600;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);}
.sidebar-fund{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;}
.sidebar-meta{font-size:9px;color:var(--textDim);line-height:1.4;}
.main{flex:1;overflow:auto;padding:28px 32px;}

/* ═══ COMPONENTS ═══ */
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:9.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;}
.btn{padding:9px 18px;border-radius:8px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-default{background:var(--card);border:1px solid var(--border);color:var(--textMuted);}
.btn-default:hover{border-color:var(--borderLight);color:var(--text);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--textMuted);}
.btn-primary{border:none;color:var(--white);}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);}
.toggle{width:36px;height:20px;border-radius:10px;padding:2px;cursor:pointer;transition:background .2s;display:inline-block;}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:var(--white);transition:transform .2s;display:block;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:9.5px;font-weight:600;color:var(--textDim);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
td{padding:10px 14px;}
thead tr{border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid rgba(30,45,74,.25);transition:background .1s;}
tbody tr:hover{background:rgba(59,130,246,.03);}
tbody tr.sel{background:rgba(59,130,246,.06);}
.mono{font-family:var(--mono);}
.fw600{font-weight:600;}.fw700{font-weight:700;}
.fs10{font-size:10px;}.fs11{font-size:11px;}.fs12{font-size:12px;}.fs13{font-size:13px;}
.metric{flex:1;min-width:130px;}
.metric-label{font-size:9.5px;color:var(--textDim);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.metric-value{font-size:24px;font-weight:700;}
.metric-sub{font-size:10px;color:var(--textDim);margin-top:2px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease-out;}
.cf-summary-strip{padding:12px 20px;background:rgba(59,130,246,.03);border-bottom:1px solid var(--border);display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
.cf-filters{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;}
.cf-filter-btn{padding:4px 12px;border-radius:6px;font-size:10.5px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--textDim);transition:all .15s;cursor:pointer;}
.cf-filter-btn.active{border-color:var(--accent);background:rgba(59,130,246,.1);color:var(--accent);}
.status-icon{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;}
.scenario-card{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;}
.scenario-card:hover{border-color:var(--borderLight);background:var(--elevated);}
.scenario-card.selected{border-color:var(--accent);background:rgba(59,130,246,.06);}
.nlp-box{width:100%;min-height:60px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;resize:vertical;outline:none;font-family:var(--font);line-height:1.5;}
.nlp-box:focus{border-color:var(--accent);}
.nlp-box::placeholder{color:var(--textDim);}
.chart-container{position:relative;}
canvas{display:block;}
.sens-cell{padding:6px 10px;text-align:center;font-size:11px;font-family:var(--mono);border:1px solid var(--border);}
.compare-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--white);transition:all .15s;flex-shrink:0;}
.compare-check.checked{background:var(--accent);border-color:var(--accent);}

/* ═══ SCENARIO GRID — Compact Layout ═══ */
.scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;}
.scenario-card-mini{padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;position:relative;}
.scenario-card-mini:hover{border-color:var(--borderLight);background:var(--elevated);}
.scenario-card-mini.selected{border-color:var(--accent);background:rgba(59,130,246,.06);box-shadow:0 0 0 1px rgba(59,130,246,.2);}
.sticky-header{position:sticky;top:-28px;z-index:10;background:var(--bg);padding:16px 0 12px;margin:-28px -32px 0;padding:16px 32px 12px;border-bottom:1px solid var(--border);}

/* ═══ SLIDER CONTROLS ═══ */
.param-slider-wrap{margin-bottom:16px;}
.param-row{display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;}
.param-label-col{width:180px;flex-shrink:0;}
.param-label{font-size:11px;font-weight:600;color:var(--text);}
.param-sublabel{font-size:9px;color:var(--textDim);margin-top:1px;}
.param-slider-col{flex:1;display:flex;align-items:center;gap:12px;}
.param-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer;}
.param-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--white);box-shadow:0 2px 8px rgba(59,130,246,.4);cursor:pointer;transition:transform .1s;}
.param-slider::-webkit-slider-thumb:hover{transform:scale(1.15);}
.param-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--white);cursor:pointer;}
.param-value-box{min-width:80px;padding:6px 10px;border-radius:6px;background:var(--card);border:1px solid var(--border);text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--orange);}
.param-base-val{font-family:var(--mono);font-size:11px;color:var(--textDim);min-width:60px;text-align:center;}

/* ═══ LIVE PREVIEW GAUGES ═══ */
.preview-strip{display:flex;gap:12px;margin-bottom:16px;}
.preview-gauge{flex:1;padding:14px;border-radius:10px;background:var(--card);border:1px solid var(--border);text-align:center;transition:border-color .2s;}
.preview-gauge.impacted{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.03);}
.preview-gauge .gauge-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--textDim);margin-bottom:6px;}
.preview-gauge .gauge-base{font-size:12px;color:var(--textMuted);margin-bottom:2px;}
.preview-gauge .gauge-stressed{font-size:22px;font-weight:700;transition:color .2s;}
.preview-gauge .gauge-delta{font-size:10px;font-weight:600;margin-top:3px;}
.preview-bar{height:4px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden;}
.preview-bar-fill{height:100%;border-radius:2px;transition:width .3s ease;}
.config-missing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:40px;text-align:center;}
.config-missing h2{color:var(--red);font-size:18px;}
.config-missing p{color:var(--textMuted);max-width:500px;line-height:1.6;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script type="module" src="../engine/bridge.js"></script>
</head>

/* ═══════════════════════════════════════════════════════════════════════
   FORMATTERS
   ═══════════════════════════════════════════════════════════════════════ */
function pct(v,dp){return v!=null?(v*100).toFixed(dp!=null?dp:1)+'%':'N/A';}
function mox(v){return v!=null?v.toFixed(2)+'x':'N/A';}
function fmtM(n){if(n==null)return'N/A';var a=Math.abs(n);if(a>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(a>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(a>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+Math.round(n);}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function pill(t,c){return'<span class="pill" style="color:'+c+';background:'+c+'15;border:1px solid '+c+'25;">'+t+'</span>';}

/* ═══════════════════════════════════════════════════════════════════════
   DERIVE DEAL DATA FROM BUNDLE — adapts BUNDLE.deals to SimEngine format
   ═══════════════════════════════════════════════════════════════════════ */
function getDeals(){
  if(!baseCase)return[];
  return baseCase.deals.map(function(d){
    var nav = d.nav || 0;
    var invested = d.invested || nav * 0.7;
    return {
      name: d.name,
      pathKey: d.pathKey,
      sector: d.sector || (d.pathKey ? d.pathKey.split(BUNDLE.pathSep || ' > ')[0] : ''),
      dtype: d.dealType || d.type || 'Equity',
      curNav: nav,
      strNav: nav, // updated when sim runs
      baseIRR: d.irr || 0,
      baseMOIC: d.moic || 1.0,
      invested: invested,
      level: d.level || 1,
      type: (d.dealType||'').toLowerCase().indexOf('credit')>=0 || (d.dealType||'').toLowerCase().indexOf('lien')>=0 ? 'credit' : 'equity'
    };
  });
}

function getFundMetrics(){
  if(!baseCase) return {irr:0,moic:1,dpi:0,rvpi:0,nav:0};
  var f = baseCase.fund;
  return {irr:f.irr||0, moic:f.moic||1, dpi:f.dpi||0, rvpi:f.rvpi||0, nav:f.nav||f.totalNAV||0};
}

   SIMULATION STATE — holds current sim result
   ═══════════════════════════════════════════════════════════════════════ */
var simResult = null; // holds { fund:{}, deals:[], mutations:[] } from server

function getSimDeals(){
  var deals = getDeals();
  if(!simResult) return deals;
  // Map simResult deals back
  return deals.map(function(d){
    var sd = simResult.deals ? simResult.deals.find(function(x){return x.pathKey===d.pathKey;}) : null;
    if(sd){
      d.strNav = sd.nav || d.curNav;
      d.simIRR = sd.irr;
      d.simMOIC = sd.moic;
    } else {
      d.strNav = d.curNav;
      d.simIRR = d.baseIRR;
      d.simMOIC = d.baseMOIC;
    }
    return d;
  });
}

function getSimFund(){
  if(!simResult) return getFundMetrics();
  return {
    irr: simResult.fund.irr || getFundMetrics().irr,
    moic: simResult.fund.moic || getFundMetrics().moic,
    dpi: simResult.fund.dpi || getFundMetrics().dpi,
    rvpi: simResult.fund.rvpi || getFundMetrics().rvpi,
    nav: simResult.fund.nav || simResult.fund.totalNAV || getFundMetrics().nav
  };
}

/* ═══════════════════════════════════════════════════════════════════════
   AI CONTROLLER — NLP → Structured Parameters via Claude
   ═══════════════════════════════════════════════════════════════════════ */
function buildSystemPrompt(){
  var deals = BUNDLE.deals;
  var ctx = 'CURRENT PORTFOLIO — ' + BUNDLE.lastQuarter + ':\n';
  deals.forEach(function(d){
    ctx += '- ' + d.name + ' (pathKey: "' + d.pathKey + '"): IRR ' + pct(d.irr) + ', MOIC ' + mox(d.moic) + ', NAV ' + fmtM(d.nav) + '\n';
  });
  ctx += '- Fund-level: IRR ' + pct(BUNDLE.fund.irr) + ', MOIC ' + mox(BUNDLE.fund.moic);
  var hierarchy = 'Hierarchy: ' + (BUNDLE.hierarchy || []).map(function(h){ return (typeof h === 'string') ? h : h.label; }).join(' > ');
  var entityIds = 'Entity pathKeys: ' + deals.map(function(d){return '"'+d.pathKey+'"';}).join(', ');

  return 'You are the AI Controller for IVP SimEngine Portfolio Simulation Platform. You translate natural language "what-if" questions into structured simulation parameters.\n\n' +
    'RULES:\n1. You NEVER calculate IRR yourself. Extract parameters for the calculation engine.\n2. ALWAYS state assumptions explicitly.\n3. When ambiguous, ask ONE clarifying question.\n4. Return ONLY valid JSON.\n\n' +
    hierarchy + '\n' + entityIds + '\n\n' + ctx + '\n\n' +
    'AVAILABLE TEMPLATES:\n' +
    'SC-01: Exit Multiple Sensitivity — target_entities:[], params: {exit_multiple: number}\n' +
    'SC-02: Hold Period Extension — target_entities:[], params: {hold_period_delta_years: number, nav_growth_rate: number}\n' +
    'SC-03: Macro Stress Test — target_entities:[], params: {nav_haircut_pct: number, hold_period_delta: number}\n' +
    'SC-05: Follow-on Investment — target_entities:[], params: {amount: number, date: "YYYY-MM-DD", nav_multiple: number}\n' +
    'SC-06: Partial Realization — target_entities:[], params: {realization_pct: number, date: "YYYY-MM-DD"}\n' +
    'SC-07: Portfolio Composition — target_entities:[], params: {action: "write_off"|"exclude"}\n' +
    'SC-10: Target IRR Backsolve — target_entities:[], params: {target_irr: number}\n\n' +
    'RESPONSE FORMAT — return ONLY this JSON:\n' +
    '{"thinking":"...","scenarios":[{"template":"SC-XX","target_entities":["pathKey"],"params":{...}}],"assumptions":["..."],"needs_clarification":false,"clarification_question":null}';
}

function callAI(query, callback){
  var apiKey = SIM_CONFIG.apiKey;
  if(!apiKey){callback(null,'No API key configured. Add your Anthropic API key to the Sim_Config sheet.');return;}

  var systemPrompt = buildSystemPrompt();
  var model = SIM_CONFIG.apiModel || 'claude-sonnet-4-20250514';

  // Primary path: route through server-side Apps Script (avoids CORS in Google Sheets iframe)
  if(typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(function(resp){
        try{
          if(!resp || resp.error){
            callback(null, 'Server AI error: ' + (resp ? resp.error : 'Unknown'));
            return;
          }
          // Track AI spend
          if(resp.usage){
            var inp = resp.usage.input_tokens || 0;
            var out = resp.usage.output_tokens || 0;
            var cost = (inp * 3 / 1e6) + (out * 15 / 1e6);
            aiSpend = {input_tokens: inp, output_tokens: out, cost: cost, used: true};
          }
          var text = resp.text || '';
          var clean = text.replace(/```json\n?|```\n?/g,'').trim();
          callback(JSON.parse(clean), null);
        }catch(e){callback(null,'AI parse error: '+e.message);}
      })
      .withFailureHandler(function(err){
        callback(null, 'Server AI call failed: ' + err.message);
      })
      .callClaudeAPI({
        apiKey: apiKey,
        model: model,
        maxTokens: 1000,
        system: systemPrompt,
        userMessage: query
      });
    return;
  }

  // Fallback: direct XHR (works in standalone / testing contexts)
  var payload = {
    model: model,
    max_tokens: 1000,
    system: systemPrompt,
    messages: [{role:'user',content:query}]
  };

  var xhr = new XMLHttpRequest();
  xhr.open('POST','https://api.anthropic.com/v1/messages',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('x-api-key',apiKey);
  xhr.setRequestHeader('anthropic-version','2023-06-01');
  xhr.setRequestHeader('anthropic-dangerous-direct-browser-access','true');
  xhr.onload=function(){
    try{
      var data=JSON.parse(xhr.responseText);
      // Track AI spend from usage object
      if(data.usage){
        var inp = data.usage.input_tokens || 0;
        var out = data.usage.output_tokens || 0;
        var cost = (inp * 3 / 1e6) + (out * 15 / 1e6);
        aiSpend = {input_tokens: inp, output_tokens: out, cost: cost, used: true};
      }
      var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
      var clean=text.replace(/```json\n?|```\n?/g,'').trim();
      callback(JSON.parse(clean),null);
    }catch(e){callback(null,'AI parse error: '+e.message);}
  };
  xhr.onerror=function(){callback(null,'API request failed. Check console for CORS errors.');};
  xhr.send(JSON.stringify(payload));
}

/* ═══════════════════════════════════════════════════════════════════════
   SIMULATION EXECUTOR — calls google.script.run.runSimulation()
   ═══════════════════════════════════════════════════════════════════════ */
function executeSimulation(scenarioConfigs, onComplete){
  isLoading=true;
  statusText='Computing XIRR deterministically…';
  render();

  // Build scenario array for the server-side engine
  var allEntities = BUNDLE.deals.map(function(d){return d.pathKey;});
  var serverScenarios = scenarioConfigs.map(function(sc){
    return {
      template: sc.template,
      target_entities: sc.target_entities || allEntities,
      params: sc.params
    };
  });

  google.script.run
    .withSuccessHandler(function(result){
      isLoading=false;
      if(!result || !result.ok){
        statusText = 'Simulation error: ' + (result ? result.error : 'Unknown');
        render();
        if(onComplete) onComplete(null);
        return;
      }
      simResult = result;
      if(onComplete) onComplete(result);
      render();
    })
    .withFailureHandler(function(err){
      isLoading=false;
      statusText = 'Server error: ' + err.message;
      render();
      if(onComplete) onComplete(null);
    })
    .runSimulation({scenarios: serverScenarios});
}

function openConfigure(){
  if(!selectedScenario) return;
  // Initialize configParams from sliderDefs defaults
  var defs = sliderDefs[selectedScenario] || [];
  configParams = {};
  defs.forEach(function(d){ configParams[d.key] = d.defaultVal; });
  step = 'configure';
  render();
}

/* ═══════════════════════════════════════════════════════════════════════
   CONFIGURE PAGE — Parameter Review with Sliders + Live Preview Gauges
   ═══════════════════════════════════════════════════════════════════════ */
function renderConfigure(){
  var mc = mode==='deal'?'var(--accent)':mode==='portfolio'?'var(--teal)':'var(--purple)';
  var modeLabel = mode==='deal'?'Deal-Level':mode==='portfolio'?'Portfolio-Level':'Combined';
  var allScenarios = scenarios.deal.concat(scenarios.portfolio);
  var sc = allScenarios.find(function(s){return s.id===selectedScenario;});
  if(!sc) return '<div>Scenario not found</div>';

  var defs = sliderDefs[selectedScenario] || [];
  var bf = getFundMetrics();
  var deals = getDeals();

  // Compute estimated impact from slider values (client-side estimation for real-time preview)
  var estNavHaircut = 0;
  var estTimingDelta = 0;
  defs.forEach(function(d){
    var val = configParams[d.key] != null ? configParams[d.key] : d.defaultVal;
    if(d.key === 'nav_haircut_pct' || d.key === 'revenue_drop' || d.key === 'ebitda_drop') estNavHaircut = val / 100;
    if(d.key === 'exit_multiple') estNavHaircut = val / (selectedScenario.charAt(0)==='P' ? 5 : 10); // rough approximation
    if(d.key === 'hold_period_delta_years' || d.key === 'hold_period_delta') estTimingDelta = val;
    if(d.key === 'missed_quarters') estNavHaircut = val * 0.008; // rough
    if(d.key === 'pik_pct') estTimingDelta = val * 0.015;
  });

  // Estimate stressed metrics (client-side rough calc for real-time feedback)
  var totalNav = bf.nav || 0;
  var estStressedNav = totalNav * (1 - estNavHaircut);
  // IRR estimation: rough rule — each 10% NAV haircut costs ~200bps IRR, each year delay costs ~300bps
  var baseIRR = bf.irr || 0;
  var irrImpact = -(estNavHaircut * 0.20) - (estTimingDelta * 0.03);
  var estStressedIRR = baseIRR + irrImpact;
  var estMOIC = (bf.moic || 1) * (1 - estNavHaircut * 0.8);
  if(selectedScenario === 'P9' || selectedScenario === 'V10'){ // upside scenarios
    var upside = (configParams['exit_multiple'] || configParams['nav_haircut_pct'] || 10) / 100;
    estStressedNav = totalNav * (1 + upside);
    estStressedIRR = baseIRR + upside * 0.15;
    estMOIC = (bf.moic || 1) * (1 + upside * 0.6);
  }

  var navDelta = estStressedNav - totalNav;
  var irrDeltaVal = (estStressedIRR - baseIRR) * 100;
  var navDeltaPct = totalNav ? ((navDelta / totalNav) * 100).toFixed(1) : '0.0';
  var isNeg = irrDeltaVal < 0;

  // Live preview gauges
  var gauges = '<div class="preview-strip">';
  gauges += previewGauge('Portfolio IRR', pct(baseIRR), pct(estStressedIRR), (irrDeltaVal>=0?'+':'') + irrDeltaVal.toFixed(1) + '%', isNeg, Math.abs(irrDeltaVal)/10);
  gauges += previewGauge('Fund MOIC', mox(bf.moic), estMOIC.toFixed(2)+'x', (estMOIC>=bf.moic?'+':'') + (estMOIC-bf.moic).toFixed(2)+'x', estMOIC<bf.moic, Math.abs(estMOIC-bf.moic)*2);
  gauges += previewGauge('Portfolio NAV', fmtM(totalNav), fmtM(estStressedNav), navDeltaPct+'%', navDelta<0, Math.abs(parseFloat(navDeltaPct))/10);
  if(estTimingDelta > 0) gauges += previewGauge('Hold Period', 'Current', '+'+estTimingDelta.toFixed(1)+' yrs', 'Extended', true, estTimingDelta/3);
  gauges += '</div>';

  // Parameter sliders
  var slidersHTML = '';
  defs.forEach(function(d, idx){
    var val = configParams[d.key] != null ? configParams[d.key] : d.defaultVal;
    var displayVal = d.format ? d.format(val) : val;

    if(d.isDealSelector){
      // Deal selector dropdown instead of slider
      var opts = deals.map(function(deal,i){
        return '<option value="'+i+'"'+(val===i?' selected':'')+'>'+esc(deal.name)+' ('+fmtM(deal.curNav)+' NAV)</option>';
      }).join('');
      slidersHTML += '<div class="param-row">' +
        '<div class="param-label-col"><div class="param-label">'+esc(d.label)+'</div><div class="param-sublabel">'+esc(d.sublabel)+'</div></div>' +
        '<div class="param-slider-col"><select style="flex:1;padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;" onchange="configParams[\''+d.key+'\']=parseInt(this.value);render();">'+opts+'</select></div></div>';
    } else if(d.isSelector){
      var opts2 = (d.options||[]).map(function(o,i){
        return '<option value="'+i+'"'+(val===i?' selected':'')+'>'+esc(o)+'</option>';
      }).join('');
      slidersHTML += '<div class="param-row">' +
        '<div class="param-label-col"><div class="param-label">'+esc(d.label)+'</div><div class="param-sublabel">'+esc(d.sublabel)+'</div></div>' +
        '<div class="param-slider-col"><select style="flex:1;padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;" onchange="configParams[\''+d.key+'\']=parseInt(this.value);render();">'+opts2+'</select></div></div>';
    } else {
      slidersHTML += '<div class="param-row">' +
        '<div class="param-label-col"><div class="param-label">'+esc(d.label)+'</div><div class="param-sublabel">'+esc(d.sublabel)+'</div></div>' +
        '<div class="param-slider-col">' +
        '<span class="param-base-val">'+d.min+(d.unit==='%'?'%':d.unit==='bps'?' bps':d.unit==='yrs'?' yr':'')+'</span>' +
        '<input type="range" class="param-slider" min="'+d.min+'" max="'+d.max+'" step="'+d.step+'" value="'+val+'" oninput="configParams[\''+d.key+'\']=parseFloat(this.value);render();">' +
        '<span class="param-base-val">'+d.max+(d.unit==='%'?'%':d.unit==='bps'?' bps':d.unit==='yrs'?' yr':'')+'</span>' +
        '<div class="param-value-box">'+displayVal+'</div>' +
        '</div></div>';
    }
  });

  // Current vs Stressed summary table for context
  var contextHTML = '<div class="card" style="padding:14px 18px;margin-bottom:16px;">' +
    '<div class="fw600 fs11" style="color:var(--textDim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Current Portfolio (Base Case)</div>' +
    '<div style="display:flex;gap:16px;flex-wrap:wrap;">';
  deals.slice(0,8).forEach(function(d){
    var estDealNav = d.curNav * (1 - estNavHaircut);
    var changed = Math.abs(estNavHaircut) > 0.001;
    contextHTML += '<div style="padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);min-width:140px;">' +
      '<div class="fs10 fw600" style="color:var(--textMuted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(d.name)+'</div>' +
      '<div style="display:flex;align-items:baseline;gap:6px;">' +
      '<span class="mono fs11" style="color:var(--textDim);'+(changed?'text-decoration:line-through;':'')+'">'+fmtM(d.curNav)+'</span>' +
      (changed ? '<span class="mono fs12 fw700" style="color:var(--orange);">→ '+fmtM(estDealNav)+'</span>' : '') +
      '</div></div>';
  });
  contextHTML += '</div></div>';

  return '<div class="fade-in">' +
    // Header
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">' +
    '<div><div style="display:flex;gap:8px;margin-bottom:4px;">'+pill(modeLabel,mc)+' '+pill(sc.id,sc.color)+'</div>' +
    '<h1 style="font-size:20px;font-weight:700;color:var(--white);margin:0;">'+sc.icon+' '+esc(sc.name)+'</h1>' +
    '<p class="fs11" style="color:var(--textDim);margin:4px 0 0;">'+esc(sc.desc)+'</p></div>' +
    '<div style="display:flex;gap:8px;">' +
    '<button class="btn btn-sm btn-default" onclick="step=\'library\';render();">← Back</button>' +
    '<button class="btn btn-primary" style="padding:10px 28px;font-size:13px;background:linear-gradient(135deg,var(--green),#16A34A);box-shadow:0 3px 16px rgba(34,197,94,.3);" onclick="confirmAndRun();">▶ Run Simulation</button></div></div>' +
    // Live preview gauges
    gauges +
    // Slider controls
    '<div class="card" style="padding:18px 20px;margin-bottom:16px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
    '<div class="fw600 fs13" style="color:var(--white);">Adjust Parameters</div>' +
    '<button class="btn btn-sm btn-default" style="font-size:10px;" onclick="resetSliders();">↩ Reset to Default</button></div>' +
    slidersHTML + '</div>' +
    // Deal-level context
    contextHTML +
    '</div>';
}

function previewGauge(label, baseVal, stressedVal, deltaStr, isNeg, barPct){
  barPct = Math.min(barPct || 0, 1);
  var barColor = isNeg ? 'var(--red)' : 'var(--green)';
  return '<div class="preview-gauge'+(Math.abs(barPct)>0.01?' impacted':'')+'">' +
    '<div class="gauge-label">'+label+'</div>' +
    '<div class="gauge-base">Base: '+baseVal+'</div>' +
    '<div class="gauge-stressed" style="color:'+(isNeg?'var(--orange)':'var(--teal)')+';">'+stressedVal+'</div>' +
    '<div class="gauge-delta" style="color:'+(isNeg?'var(--red)':'var(--green)')+';">'+deltaStr+'</div>' +
    '<div class="preview-bar"><div class="preview-bar-fill" style="width:'+Math.round(barPct*100)+'%;background:'+barColor+';"></div></div></div>';
}

function resetSliders(){
  var defs = sliderDefs[selectedScenario] || [];
  configParams = {};
  defs.forEach(function(d){ configParams[d.key] = d.defaultVal; });
  render();
}

function confirmAndRun(){
  if(!selectedScenario) return;
  var allScenarios = scenarios.deal.concat(scenarios.portfolio);
  var sc = allScenarios.find(function(s){return s.id===selectedScenario;});
  if(!sc) return;

  simName = sc.name;
  aiSpend = {input_tokens:0, output_tokens:0, cost:0, used:false}; // No AI for pre-built

  // Build params from slider values, mapping back to engine format
  var defs = sliderDefs[selectedScenario] || [];
  var engineParams = {};

  // Start with default simParams
  for(var k in sc.simParams.params){ engineParams[k] = sc.simParams.params[k]; }

  // Override with slider-adjusted values
  defs.forEach(function(d){
    var val = configParams[d.key] != null ? configParams[d.key] : d.defaultVal;
    if(d.key === 'nav_haircut_pct' || d.key === 'revenue_drop' || d.key === 'ebitda_drop'){
      engineParams.nav_haircut_pct = val / 100;
    } else if(d.key === 'hold_period_delta_years' || d.key === 'hold_period_delta'){
      if(sc.simParams.params.hold_period_delta_years !== undefined) engineParams.hold_period_delta_years = val;
      else engineParams.hold_period_delta = val;
    } else if(d.key === 'exit_multiple'){
      engineParams.exit_multiple = selectedScenario.charAt(0)==='P' ? val/100 : -(val/10);
    } else if(d.key === 'exclude_deal'){
      var deals = getDeals();
      if(deals[val]) engineParams.target_entity = deals[val].pathKey;
    }
  });

  var allEntities = BUNDLE.deals.map(function(d){return d.pathKey;});
  var targetEntities = engineParams.target_entity ? [engineParams.target_entity] : allEntities;
  delete engineParams.target_entity;

  var config = {
    template: sc.simParams.template,
    target_entities: targetEntities,
    params: engineParams
  };

  executeSimulation([config], function(result){
    if(result){ step='results'; simRan=true; simSaved=false; }
    render();
  });
}

function parseNLP(){
  var input = document.getElementById('nlpInput');
  customNLP = input ? input.value : '';
  if(!customNLP.trim()) return;

  isLoading=true; statusText='AI parsing scenario…'; render();

  callAI(customNLP, function(aiResp, aiError){
    isLoading=false;
    if(aiError){
      statusText=aiError; render(); return;
    }
    if(aiResp && aiResp.needs_clarification){
      statusText = aiResp.clarification_question || 'Please clarify your scenario.';
      render(); return;
    }

    // Build display params from AI response
    nlpParams = [];
    if(aiResp.thinking) nlpParams.push({label:'Interpretation',value:aiResp.thinking});
    if(aiResp.scenarios && aiResp.scenarios.length){
      var sc = aiResp.scenarios[0];
      nlpParams.push({label:'Template',value:sc.template});
      nlpParams.push({label:'Targets',value:(sc.target_entities||['All Deals']).join(', ')});
      for(var k in sc.params){nlpParams.push({label:k,value:String(sc.params[k])||''});}
    }
    if(aiResp.assumptions){nlpParams.push({label:'Assumptions',value:aiResp.assumptions.join('; ')});}

    // Store for execution
    window._pendingAIScenarios = aiResp.scenarios || [];
    nlpParsed=true;
    render();
  });
}

function runCustomScenario(){
  var aiScenarios = window._pendingAIScenarios || [];
  if(aiScenarios.length === 0){
    // Fallback: use default stress
    aiScenarios = [{template:'SC-03',target_entities:[],params:{nav_haircut_pct:0.15}}];
  }
  selectedScenario = 'Custom';
  simName = 'Custom: ' + (customNLP||'').substring(0,40);
  executeSimulation(aiScenarios, function(result){
    if(result){step='results';simRan=true;simSaved=false;}
    render();
  });
}

  var modeLabel = mode==='deal'?'Deal-Level':mode==='portfolio'?'Portfolio-Level':'Combined';

/* ═══════════════════════════════════════════════════════════════════════
   CASHFLOW DELTA AUDIT PANEL
   ═══════════════════════════════════════════════════════════════════════ */
function renderCFPanel(d){
  // Build synthetic CF delta from base vs sim
  var baseCF = d.curNav;
  var stressCF = d.strNav;
  var delta = stressCF - baseCF;
  var pctDelta = baseCF ? ((delta/baseCF)*100).toFixed(1) : '0.0';

  // Simple display — in production this would come from the engine's mutation log
  var items = [
    {date:'Historical',type:'Capital Calls',base:-Math.abs(d.invested||baseCF*0.7),stress:-Math.abs(d.invested||baseCF*0.7),status:'unchanged',note:'Actual historical — unchanged'},
    {date:'Current',type:'Current NAV',base:baseCF,stress:stressCF,status:delta!==0?'modified':'unchanged',note:delta!==0?'NAV stressed: '+fmtM(baseCF)+' → '+fmtM(stressCF):''},
  ];
  if(perfEnabled && exitDelay>0){
    items.push({date:'Projected',type:'Terminal Exit',base:baseCF,stress:null,status:'removed',note:'Removed: exit delayed '+exitDelay+'yr'});
    items.push({date:'Stressed',type:'Delayed Exit',base:null,stress:stressCF,status:'added',note:'Added: delayed exit (+'+exitDelay+'yr)'});
  }

  var counts={all:items.length,unchanged:0,modified:0,added:0,removed:0};
  items.forEach(function(c){counts[c.status]++;});
  counts.changes=counts.modified+counts.added+counts.removed;
  var filtered=cfFilter==='all'?items:cfFilter==='changes'?items.filter(function(c){return c.status!=='unchanged';}):items.filter(function(c){return c.status===cfFilter;});

  var sc={unchanged:{c:'var(--textDim)',i:'─',l:'Unchanged'},modified:{c:'var(--orange)',i:'✎',l:'Modified'},added:{c:'var(--green)',i:'+',l:'Added'},removed:{c:'var(--red)',i:'×',l:'Removed'}};

  var rows=filtered.map(function(cf){
    var s=sc[cf.status];
    var bStr=cf.base===null?'—':fmtM(cf.base);
    var sStr=cf.stress===null?'—':fmtM(cf.stress);
    return '<tr style="background:'+s.c+'06;">' +
      '<td><div style="display:flex;align-items:center;gap:6px;"><span class="status-icon" style="font-size:'+(cf.status==='added'?14:11)+'px;color:'+s.c+';background:'+s.c+'18;border:1px solid '+s.c+'30;">'+s.i+'</span><span class="fs10 fw600" style="color:'+s.c+';">'+s.l+'</span></div></td>' +
      '<td class="mono fs12">'+esc(cf.date)+'</td><td class="fs11" style="color:var(--textMuted);">'+esc(cf.type)+'</td>' +
      '<td class="mono fs12" style="color:var(--textMuted);'+(cf.status==='removed'?'text-decoration:line-through;opacity:.6;':'')+'">'+bStr+'</td>' +
      '<td class="mono fs12 fw600" style="color:'+(cf.status==='modified'||cf.status==='added'?'var(--orange)':'var(--text)')+';">'+sStr+'</td>' +
      '<td class="fs10" style="color:'+(cf.note?s.c:'var(--textDim)')+';max-width:200px;">'+esc(cf.note||'—')+'</td></tr>';
  }).join('');

  var fBtns=[{k:'all',l:'All ('+counts.all+')'},{k:'changes',l:'Changes ('+counts.changes+')'},{k:'modified',l:'Modified ('+counts.modified+')',c:'var(--orange)'},{k:'added',l:'Added ('+counts.added+')',c:'var(--green)'},{k:'removed',l:'Removed ('+counts.removed+')',c:'var(--red)'}];
  var filterHTML = fBtns.map(function(f){
    return '<button class="cf-filter-btn '+(cfFilter===f.k?'active':'')+'" onclick="event.stopPropagation();cfFilter=\''+f.k+'\';render();" '+(f.c&&cfFilter===f.k?'style="border-color:'+f.c+';background:'+f.c+'15;color:'+f.c+';"':'')+'>'+f.l+'</button>';
  }).join('');

  return '<div style="border-top:1px solid var(--border);" onclick="event.stopPropagation();">' +
    '<div class="cf-summary-strip"><div><div class="fs10" style="color:var(--textDim);text-transform:uppercase;">Base NAV</div><div class="mono fw700" style="font-size:14px;color:var(--teal);">'+fmtM(baseCF)+'</div></div>' +
    '<div style="font-size:16px;color:var(--textDim);">→</div>' +
    '<div><div class="fs10" style="color:var(--textDim);text-transform:uppercase;">Stressed NAV</div><div class="mono fw700" style="font-size:14px;color:var(--orange);">'+fmtM(stressCF)+'</div></div>' +
    '<div style="font-size:16px;color:var(--textDim);">Δ</div>' +
    '<div><div class="fs10" style="color:var(--textDim);text-transform:uppercase;">Net Change</div><div class="mono fw700" style="font-size:14px;color:'+(delta<0?'var(--red)':'var(--green)')+';">'+pctDelta+'%</div></div></div>' +
    '<div class="cf-filters">'+filterHTML+'</div>' +
    '<div style="max-height:300px;overflow:auto;"><table><thead><tr><th>Status</th><th>Period</th><th>Type</th><th>Base</th><th>Stressed</th><th>Detail</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════
   SAVE SIMULATION
   ═══════════════════════════════════════════════════════════════════════ */
function saveSimulation(){
  simCounter++;
  var simId = 'SIM-'+String(simCounter).padStart(3,'0');
  var sf = getSimFund();
  var bf = getFundMetrics();
  var irrDelta = ((sf.irr - bf.irr)*100).toFixed(1);

  savedSims.push({
    id: simId,
    name: simName,
    type: mode,
    scenario: selectedScenario || 'Custom',
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),
    sirr: pct(sf.irr),
    smoic: mox(sf.moic),
    nav: sf.nav !== bf.nav ? ((sf.nav-bf.nav)/bf.nav*100).toFixed(1)+'%' : null,
    irrDelta: irrDelta
  });
  simSaved=true;

  // Persist to Simulation_Log sheet
  try {
    google.script.run.saveSimulationToLog({
      simId: simId,
      query: simName,
      scenarios: [{template:selectedScenario||'Custom'}],
      baseIRR: bf.irr,
      simIRR: sf.irr,
      deltaBPS: Math.round((sf.irr - bf.irr) * 10000),
      mutations: simResult && simResult.mutations ? simResult.mutations : []
    });
  } catch(e){}

  render();
}

    var selected = savedSims.filter(function(s){return compareSelected[s.id];});
    comparisonHTML = '<div class="card fade-in" style="padding:20px;margin-bottom:16px;">' +
      '<div class="fw600 fs13" style="color:var(--white);margin-bottom:16px;">Scenario Comparison — '+selCount+' Selected</div>' +
      '<div style="display:flex;gap:12px;margin-bottom:16px;">' +
      '<div class="card" style="flex:1;padding:14px;"><div class="fw600 fs12" style="color:var(--white);margin-bottom:10px;">IRR Comparison</div><canvas id="compareIRR" height="160"></canvas></div>' +
      '<div class="card" style="flex:1;padding:14px;"><div class="fw600 fs12" style="color:var(--white);margin-bottom:10px;">MOIC Comparison</div><canvas id="compareMOIC" height="160"></canvas></div></div>' +
      '<table><thead><tr><th>Scenario</th><th>Type</th><th>NAV Impact</th><th>Stressed IRR</th><th>Stressed MOIC</th><th>IRR vs Base</th></tr></thead><tbody>' +
      '<tr style="background:rgba(20,184,166,.06);"><td class="fw600 fs12" style="color:var(--teal);">Base Case (Current)</td><td>—</td><td>—</td><td class="mono fs12 fw600" style="color:var(--teal);">'+pct(getFundMetrics().irr)+'</td><td class="mono fs12 fw600">'+mox(getFundMetrics().moic)+'</td><td>—</td></tr>';
    selected.forEach(function(s){
      var c=s.type==='deal'?'var(--accent)':s.type==='portfolio'?'var(--teal)':'var(--purple)';
      comparisonHTML += '<tr><td class="fw600 fs12" style="color:var(--white);">'+esc(s.name)+'</td>' +
        '<td>'+pill(s.type==='deal'?'Deal':s.type==='portfolio'?'Portfolio':'Combined',c)+'</td>' +
        '<td class="mono fs12 fw600" style="color:'+(s.nav?'var(--orange)':'var(--textDim)')+';">'+(s.nav||'—')+'</td>' +
        '<td class="mono fs12 fw600" style="color:var(--orange);">'+s.sirr+'</td>' +
        '<td class="mono fs12 fw600">'+s.smoic+'</td>' +
        '<td class="mono fs12 fw600" style="color:var(--red);">'+s.irrDelta+'%</td></tr>';
    });
    comparisonHTML += '</tbody></table></div>';
  }

  return '<div class="fade-in">' +
    '<div style="margin-bottom:20px;"><h1 style="font-size:22px;font-weight:700;color:var(--white);margin:0 0 6px;">Compare Scenarios</h1>' +
    '<p class="fs12" style="color:var(--textDim);margin:0;">Select 2+ saved simulations for side-by-side comparison</p></div>' +
    comparisonHTML +
    '<div class="card" style="overflow:hidden;">' +
    '<div style="padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">' +
    '<span class="fw600 fs12" style="color:var(--white);">Select Scenarios to Compare</span>' +
    '<span class="fs11" style="color:var(--textDim);">'+selCount+' selected</span></div>' +
    '<table><thead><tr><th style="width:40px;"></th><th>Simulation</th><th>Type</th><th>Scenario</th><th>NAV Impact</th><th>Stressed IRR</th><th>Stressed MOIC</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ═══════════════════════════════════════════════════════════════════════
   CANVAS CHARTS — Vanilla JS bar charts
   ═══════════════════════════════════════════════════════════════════════ */
function bindCharts(){
  setTimeout(function(){
    var deals = getSimDeals();
    if(document.getElementById('chartIRR')){
      drawBarChart('chartIRR',
        deals.map(function(d){return d.name.split(' ')[0];}),
        deals.map(function(d){return (d.baseIRR||0)*100;}),
        deals.map(function(d){return ((d.simIRR!=null?d.simIRR:d.baseIRR)||0)*100;}),
        '%','#14B8A6','#F59E0B');
    }
    if(document.getElementById('chartMOIC')){
      drawBarChart('chartMOIC',
        deals.map(function(d){return d.name.split(' ')[0];}),
        deals.map(function(d){return d.baseMOIC||1;}),
        deals.map(function(d){return d.simMOIC!=null?d.simMOIC:d.baseMOIC||1;}),
        'x','#14B8A6','#F59E0B');
    }
    if(document.getElementById('chartNAV')){
      drawBarChart('chartNAV',
        deals.map(function(d){return d.name.split(' ')[0];}),
        deals.map(function(d){return d.curNav/1e6;}),
        deals.map(function(d){return d.strNav/1e6;}),
        '$M','#14B8A6','#F59E0B');
    }
    // Compare charts
    if(document.getElementById('compareIRR')){
      var sel = savedSims.filter(function(s){return compareSelected[s.id];});
      if(sel.length>=2){
        var baseIRR = getFundMetrics().irr*100;
        var labels=['Base'].concat(sel.map(function(s){return s.name.split(' ').slice(0,2).join(' ');}));
        var vals=[baseIRR].concat(sel.map(function(s){return parseFloat(s.sirr);}));
        var colors=['#14B8A6'].concat(sel.map(function(_,i){return ['#3B82F6','#F59E0B','#EF4444','#A78BFA','#22C55E'][i%5];}));
        drawSingleBarChart('compareIRR',labels,vals,colors,'%');
        var moicVals=[getFundMetrics().moic].concat(sel.map(function(s){return parseFloat(s.smoic);}));
        drawSingleBarChart('compareMOIC',labels,moicVals,colors,'x');
      }
    }
  },60);
}

function drawBarChart(id,labels,base,stress,suffix,c1,c2){
  var canvas=document.getElementById(id);if(!canvas)return;
  var ctx=canvas.getContext('2d');var W=canvas.parentElement.clientWidth-32;canvas.width=W;canvas.height=180;
  var max=Math.max.apply(null,base.concat(stress))*1.15||1;var n=labels.length;
  if(n===0) return;
  var gap=W/(n*3+1);var bw=gap*1.2;
  ctx.clearRect(0,0,W,180);
  for(var i=0;i<n;i++){
    var x=gap+(i*(bw*2+gap*1.5));
    var h1=(base[i]/max)*140;var h2=(stress[i]/max)*140;
    ctx.fillStyle=c1+'90';ctx.beginPath();ctx.roundRect(x,160-h1,bw,h1,3);ctx.fill();
    ctx.fillStyle=c2+'90';ctx.beginPath();ctx.roundRect(x+bw+2,160-h2,bw,h2,3);ctx.fill();
    if(h1>h2){ctx.fillStyle='#EF444430';ctx.fillRect(x+bw+2,160-h1,bw,h1-h2);}
    ctx.fillStyle='#94A3B8';ctx.font='9px DM Sans';ctx.textAlign='center';ctx.fillText(labels[i],x+bw+1,175);
    ctx.fillStyle=c1;ctx.font='bold 9px JetBrains Mono';ctx.fillText(base[i].toFixed(1)+suffix,x+bw/2,155-h1);
    ctx.fillStyle=c2;ctx.fillText(stress[i].toFixed(1)+suffix,x+bw+2+bw/2,155-h2);
  }
  ctx.fillStyle=c1;ctx.fillRect(W-120,5,10,10);ctx.fillStyle='#94A3B8';ctx.font='10px DM Sans';ctx.textAlign='left';ctx.fillText('Base',W-106,14);
  ctx.fillStyle=c2;ctx.fillRect(W-60,5,10,10);ctx.fillStyle='#94A3B8';ctx.fillText('Stressed',W-46,14);
}

function drawSingleBarChart(id,labels,vals,colors,suffix){
  var canvas=document.getElementById(id);if(!canvas)return;
  var ctx=canvas.getContext('2d');var W=canvas.parentElement.clientWidth-28;canvas.width=W;canvas.height=160;
  var absMax=Math.max.apply(null,vals.map(Math.abs))*1.2||1;var n=labels.length;var bw=Math.min(40,W/(n*1.5));var gap=(W-n*bw)/(n+1);
  ctx.clearRect(0,0,W,160);
  var baseline=vals.some(function(v){return v<0;})?100:140;
  for(var i=0;i<n;i++){
    var x=gap+(i*(bw+gap));var h=Math.abs(vals[i]/absMax)*80;
    ctx.fillStyle=colors[i]+'B0';
    if(vals[i]>=0){ctx.beginPath();ctx.roundRect(x,baseline-h,bw,h,3);ctx.fill();}
    else{ctx.beginPath();ctx.roundRect(x,baseline,bw,h,3);ctx.fill();}
    ctx.fillStyle='#94A3B8';ctx.font='8px DM Sans';ctx.textAlign='center';
    ctx.fillText(labels[i].substring(0,8),x+bw/2,vals[i]>=0?baseline+14:baseline+h+12);
    ctx.fillStyle=colors[i];ctx.font='bold 9px JetBrains Mono';
    ctx.fillText(vals[i].toFixed(1)+suffix,x+bw/2,vals[i]>=0?baseline-h-4:baseline+h+24);
  }
}
</script>
